


name: CICD pipeline-3 workflow

on: [ workflow_dispatch ]

jobs:

    compile:
        runs-on: self-hosted
        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup JDK-17
              uses: actions/setup-java@v4
              with:
                java-version: '17'
                distribution: 'temurin'
                cache: maven

            - name: Install maven
              run: |
               sudo apt update -y
               sudo apt install maven -y

            - name: Build with maven
              run: mvn -B clean package

            
    sonarqube:
        runs-on: self-hosted
        needs: compile
        steps:
            - name: SonarQube code quality analysis report
              run: mvn sonar:sonar


    security-check:
        runs-on: self-hosted
        needs: sonarqube
        steps:
            - name: Install trivy
              run: |

               wget https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.deb
               sudo dpkg -i trivy_0.71.2_Linux-64bit.deb

            - name: trivy filesystem scan
              run: trivy fs --format table -o fs-report.json .
              
              

   