name: CICD pipeline 2 workflow

on: [workflow_dispatch]

jobs:
  build:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup jdk-17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven installation
        run: |
          sudo apt update
          sudo apt install maven -y

      - name: Build using maven
        run: mvn -B clean package

  sonarqube:
    runs-on: [self-hosted, linux, x64]
    needs: build

    steps:
    #   - name: Checkout the code
    #     uses: actions/checkout@v4

      - name: Setup jdk-17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Sonarqube code quality analysis report
        run: mvn sonar:sonar

  security-check:
    runs-on: [self-hosted, linux, x64]
    needs: SonarQube

    steps:
    #   - name: Checkout Code
    #     uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.deb
          sudo dpkg -i trivy_0.71.2_Linux-64bit.deb

      - name: Trivy Filesystem Scan
        run: |
          trivy fs --format table -o fs-report.txt .

  docker-build:
    runs-on: [ self-hosted, linux, x64 ]
    needs: security-check

    steps:
        - name: Build docker image
          run: |
           docker build -t ${{ secrets.Docker_Repository }}:${{ github.sha }} .

