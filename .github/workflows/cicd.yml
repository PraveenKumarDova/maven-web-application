
name: CICD pipeline 2 workflow

on: [ workflow_dispatch ]

jobs:

    build:
        runs-on: [self-hosted, linux, x64 ]

        steps:
            - name: Checkout the code
              uses: actions/checkout@v4

            - name: Setup jdk-17
              uses: actions/setup-java@v4
              with: 
                java-version: '17'
                distribution: 'temurin'
                cache: maven

            - name: Maven installation
              run: |
               sudo apt update
               sudo apt install maven -y

            - name: Build using maven
              run: mvn -B clean package
    SonarQube:
        runs-on: [ self-hosted, linux, x64 ]
        needs: build
        steps:
            - name: Sonarqube code quality anlysis report
              run: mvn sonar:sonar

    Security-check:
        runs-on: [ self-hosted, linux, x64 ]
        needs: SonarQube
        steps:
            - name: Install trivy
              run: |
              wget https://github.com/aquasecurity/trivy/releases/download/v0.71.2/trivy_0.71.2_Linux-64bit.deb
              sudo dpkg -i trivy_0.71.2_Linux-64bit.deb

            - name: Trivy Filesystem scan
              run: trivy fs --format table -o fs-report.json

              


              

       