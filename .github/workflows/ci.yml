
name: Simple build and deploy

on: [ workflow_dispatch ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: setup jdk-17
        uses: actions/checkout@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with maven
        run: mvn clean package 

      - name: Deploy the war file into tomcat application server
        env:
        TOMCAT_URL: ${{ secrets.TOMCAT_URL }}
        TOMCAT_USERNAME: ${{ secrets.TOMCAT_USERNAME }}
        TOMCAT_PASSWORD: ${{ secrets.TOMCAT_PASSWORD }}

        run: |
          WAR=$(ls target/*.war | head -n 1 )  # indicates the first war file to be stored in WAR variable
          curl -sS -u "${TOMCAT_USERNAME}:${TOMCAT_PASSWORD}" --upload-file "$WAR" "${TOMCAT_URL}/manager/text/deploy?path=/maven-web-application&update=true"
